name: app
description: "A premium fintech flutter app."
publish_to: 'none' # Remove this line if you wish to publish to pub.dev
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  go_router: ^13.2.0
  isar: ^3.1.0+1
  isar_flutter_libs: ^3.1.0+1
  flutter_secure_storage: ^9.0.0
  purchases_flutter: ^8.1.1
  google_mlkit_text_recognition: ^0.13.0
  tflite_flutter: ^0.10.4
  flutter_local_notifications: ^17.1.2
  rive: ^0.13.0
  lottie: ^3.1.0
  flutter_animate: ^4.5.0
  pdf: ^3.10.8
  path_provider: ^2.1.2
  firebase_core: ^2.25.4
  firebase_analytics: ^10.8.0
  firebase_crashlytics: ^3.4.18
  firebase_auth: ^4.17.6
  google_fonts: ^6.2.1
  glassmorphism: ^3.0.0
  cupertino_icons: ^1.0.6
  google_generative_ai: ^0.4.7
  image_picker: ^1.1.2
  flutter_dotenv: ^5.1.0
  shared_preferences: ^2.2.3
  flutter_markdown: ^0.7.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.8
  isar_generator: ^3.1.0+1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
    - assets/json/
    - .env
