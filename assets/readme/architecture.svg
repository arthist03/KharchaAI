<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 280" width="1000" height="280">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#00D4C5"/>
    </marker>
  </defs>

  <rect width="1000" height="280" fill="#0A0E1A"/>

  <g>
    <rect x="40" y="110" width="140" height="60" rx="10" fill="#0F1729" stroke="#00D4C5" stroke-width="1.5"/>
    <text x="110" y="138" text-anchor="middle" fill="#fff" font-family="system-ui, sans-serif" font-size="14" font-weight="600">User Action</text>
    <text x="110" y="156" text-anchor="middle" fill="#9CA3AF" font-family="system-ui, sans-serif" font-size="11">tap · scan · ask</text>
  </g>

  <g>
    <rect x="240" y="110" width="160" height="60" rx="10" fill="#0F1729" stroke="#00D4C5" stroke-width="1.5"/>
    <text x="320" y="138" text-anchor="middle" fill="#fff" font-family="system-ui, sans-serif" font-size="14" font-weight="600">Flutter UI</text>
    <text x="320" y="156" text-anchor="middle" fill="#9CA3AF" font-family="system-ui, sans-serif" font-size="11">Riverpod · GoRouter</text>
  </g>

  <g>
    <rect x="460" y="30" width="170" height="50" rx="10" fill="#0F1729" stroke="#00D4C5" stroke-width="1.5"/>
    <text x="545" y="60" text-anchor="middle" fill="#fff" font-family="system-ui, sans-serif" font-size="13" font-weight="600">Firebase Auth</text>
  </g>
  <g>
    <rect x="460" y="115" width="170" height="50" rx="10" fill="#0F1729" stroke="#00D4C5" stroke-width="1.5"/>
    <text x="545" y="138" text-anchor="middle" fill="#fff" font-family="system-ui, sans-serif" font-size="13" font-weight="600">ML Kit (on-device)</text>
    <text x="545" y="153" text-anchor="middle" fill="#9CA3AF" font-family="system-ui, sans-serif" font-size="10">OCR · text recognition</text>
  </g>
  <g>
    <rect x="460" y="200" width="170" height="50" rx="10" fill="#0F1729" stroke="#00D4C5" stroke-width="1.5"/>
    <text x="545" y="223" text-anchor="middle" fill="#fff" font-family="system-ui, sans-serif" font-size="13" font-weight="600">Gemini 2.5 Flash</text>
    <text x="545" y="238" text-anchor="middle" fill="#9CA3AF" font-family="system-ui, sans-serif" font-size="10">+ user context payload</text>
  </g>

  <g>
    <rect x="700" y="110" width="240" height="60" rx="10" fill="#0F1729" stroke="#00D4C5" stroke-width="1.5"/>
    <text x="820" y="138" text-anchor="middle" fill="#fff" font-family="system-ui, sans-serif" font-size="14" font-weight="600">SharedPreferences</text>
    <text x="820" y="156" text-anchor="middle" fill="#9CA3AF" font-family="system-ui, sans-serif" font-size="11">transactions · settings · chat</text>
  </g>

  <g stroke="#00D4C5" stroke-width="2" fill="none" marker-end="url(#arrow)">
    <line x1="180" y1="140" x2="240" y2="140" stroke-dasharray="4 4">
      <animate attributeName="stroke-dashoffset" from="0" to="-16" dur="0.8s" repeatCount="indefinite"/>
    </line>
    <line x1="400" y1="125" x2="460" y2="60" stroke-dasharray="4 4">
      <animate attributeName="stroke-dashoffset" from="0" to="-16" dur="0.8s" repeatCount="indefinite"/>
    </line>
    <line x1="400" y1="140" x2="460" y2="140" stroke-dasharray="4 4">
      <animate attributeName="stroke-dashoffset" from="0" to="-16" dur="0.8s" repeatCount="indefinite"/>
    </line>
    <line x1="400" y1="160" x2="460" y2="220" stroke-dasharray="4 4">
      <animate attributeName="stroke-dashoffset" from="0" to="-16" dur="0.8s" repeatCount="indefinite"/>
    </line>
    <line x1="630" y1="140" x2="700" y2="140" stroke-dasharray="4 4">
      <animate attributeName="stroke-dashoffset" from="0" to="-16" dur="0.8s" repeatCount="indefinite"/>
    </line>
  </g>
